services:
  postgres:
    image: postgres:16
    container_name: hms-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: auth_db,patient_db,appointment_db,notification_db,billing_db,audit_db,analytics_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hms-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis-password}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: hms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: hms-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  discovery-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: discovery-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8761
    ports:
      - "8761:8761"

  config-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: config-server
    depends_on:
      - discovery-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      CONFIG_GIT_URI: ${CONFIG_GIT_URI:-https://github.com/SujalGadhave/hms-config-repo}
    ports:
      - "8888:8888"

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: api-gateway
    depends_on:
      - discovery-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-32-byte-secret}
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-32-byte-secret}
    ports:
      - "8081:8081"

  patient-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: patient-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: patient_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    ports:
      - "8082:8082"

  appointment-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: appointment-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8083
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appointment_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    ports:
      - "8083:8083"

  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8084
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      MAIL_USERNAME: ${MAIL_USERNAME:-replace-with-mail-user}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-replace-with-mail-password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    ports:
      - "8084:8084"

  billing-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: billing-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8085
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: billing_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    ports:
      - "8085:8085"

  audit-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: audit-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8086
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: audit_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    ports:
      - "8086:8086"

  analytics-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        MODULE: analytics-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      SERVER_PORT: 8087
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: analytics_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    ports:
      - "8087:8087"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  postgres_data:
